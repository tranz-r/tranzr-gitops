{{- if .Values.gatewayApi.enabled }}
{{- $g := .Values.gatewayApi.gateway }}
{{- $r := .Values.gatewayApi.routes.api }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $r.name }}
  namespace: {{ $r.namespace }}
spec:
  parentRefs:
    - name: {{ $g.name }}
      namespace: {{ $g.namespace }}
      sectionName: https
  hostnames:
    - {{ $r.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $r.serviceName }}
          port: {{ $r.servicePort }}
{{- end }}
