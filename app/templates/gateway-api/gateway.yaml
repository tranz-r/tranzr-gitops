{{- if .Values.gatewayApi.enabled }}
{{- $g := .Values.gatewayApi.gateway }}
{{- $gatewayNamespace := default (.Release.Namespace | default .Values.namespaceOverride) $g.namespace }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $g.name }}
  namespace: {{ $gatewayNamespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $g.clusterIssuer | quote }}
spec:
  gatewayClassName: {{ $g.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: {{ $g.hostname | quote }}
      allowedRoutes:
        namespaces:
          from: All

    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ $g.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $g.tlsSecretName }}
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
