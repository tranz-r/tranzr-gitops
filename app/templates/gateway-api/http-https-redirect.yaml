{{- if .Values.gatewayApi.enabled }}
{{- $g := .Values.gatewayApi.gateway }}
{{- $r := .Values.gatewayApi.routes.httpRedirect }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $r.name }}
  namespace: {{ $g.namespace }}
spec:
  parentRefs:
    - name: {{ $g.name }}
      namespace: {{ $g.namespace }}
      sectionName: http
  hostnames:
{{- range $r.hostnames }}
    - {{ . | quote }}
{{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: {{ $r.redirectStatusCode }}
{{- end }}
