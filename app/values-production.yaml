# Production environment overrides.
# Merged with values.yaml by the production ApplicationSet (main branch).

fullnameOverride: "trm-prod"

global:
  # Production cluster StorageClass (must exist on the prod cluster)
  defaultStorageClass: "hcloud-volumes"

ingress:
  enabled: false

pgcluster:
  cluster:
    storage:
      # CNPG volumes: use same class as global.defaultStorageClass for prod
      storageClass: "hcloud-volumes"

gatewayApi:
  enabled: true
  # Override nested keys here as needed, e.g. gateway.hostname, routes.api.hostname

deployments:
  backend:
    replicaCount: 2
    env:
      - name: CHECKOUT_SESSION_SUCCESS_URL
        value: "https://tranzr.co.uk/moves/checkout/success?session_id={CHECKOUT_SESSION_ID}"
      - name: CHECKOUT_SESSION_CANCEL_URL
        value: "https://tranzr.co.uk/moves/checkout/cancel"

chatwoot:
  serviceAccount:
    create: false
    name: trm-prod
  ingress:
    enabled: false
  # Enable internal bundled Postgres & Redis
  postgresql:
    enabled: true
    primary:
      persistence:
        storageClass: hcloud-volumes
        size: 10Gi
  redis:
    enabled: true
    master:
      persistence:
        storageClass: hcloud-volumes

  env:
    FRONTEND_URL: "https://chat.tranzr.co.uk"
    MAILER_SENDER_EMAIL: "noreply@tranzr.co.uk"
    SMTP_DOMAIN: "tranzr.co.uk"
