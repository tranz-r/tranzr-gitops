# Staging environment overrides.
# Merged with values.yaml by the staging ApplicationSet (develop branch).
# Must match Argo CD Application destination namespace (staging_namespace in Terraform).
namespaceOverride: "tranzr-moves-staging"
# Short release name for staging to keep resource names (e.g. CronJobs) under length limits.
fullnameOverride: "trm-stg"

global:
  # Staging cluster: set both global.defaultStorageClass and pgcluster.cluster.storage.storageClass
  # to the StorageClass that exists on the staging cluster (can differ from production).
  defaultStorageClass: "synology-iscsi-delete-wffc"

ingress:
  enabled: true

pgcluster:
  cluster:
    storage:
      storageClass: "synology-iscsi-delete-wffc"

gatewayApi:
  enabled: false

chatwoot:
  serviceAccount:
    create: false
    name: trm-stg
  ingress:
    enabled: true
  # Enable internal bundled Postgres & Redis
  postgresql:
    enabled: true
    primary:
      persistence:
        storageClass: synology-iscsi-delete-wffc
        size: 10Gi
  redis:
    enabled: true
    master:
      persistence:
        storageClass: synology-iscsi-delete-wffc
